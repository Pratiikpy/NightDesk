venue:
  name: BINANCE
  account_type: MARGIN
  oms_type: NETTING
  starting_balances:
    - amount: 100000
      currency: USDT

strategy:
  module: strategy
  class: ConvergenceStrategy
  config_class: ConvergenceStrategyConfig
  config:
    order_id_tag: "001"
    trade_size: "0.01"
    lookback_period: 48
    entry_z: 1.5
    exit_z: 0.3

instrument:
  id: BTCUSDT.BINANCE
  kind: perpetual
  raw_symbol: BTCUSDT
  base_currency: BTC
  quote_currency: USDT
  settlement_currency: USDT
  price_precision: 2
  size_precision: 3
  price_increment: "0.01"
  size_increment: "0.001"
  lot_size: "0.001"
  maker_fee: "0.0002"
  taker_fee: "0.0005"
  bar_type: BTCUSDT.BINANCE-1-HOUR-LAST-EXTERNAL
